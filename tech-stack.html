<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./access/css/home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./access/tailwind.js">
    <style type="text/tailwindcss">
        :root {
            --btn-color: #334155;
            --hover-color: #eab308;
        }

        @theme {
            --color-brand-btn: var(--btn-color);
            --color-brand-hover: var(--hover-color);
        }

        .tech-box{
            @apply text-5xl flex flex-col items-center gap-3 p-5 rounded-2xl bg-[var(--btn-color)] text-white text-center transition-all duration-300 ease-in-out hover:-translate-y-1 hover:bg-[var(--hover-color)] hover:text-black
        }
    </style>
    <title>Tech Stack</title>
</head>

<body class="w-full h-screen bg-gradient-to-t from-[#000000] to-[#152331]">
    <header>
        <!-- nav bar start -->

        <!-- hamburger menu  -->
        <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox">

        <nav class="nav-container">
            <div class="brand-logo">
                <i class="fa-solid fa-user-secret py-2"></i>
            </div>

            <label for="nav-toggle" class="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </label>

            <ul class="nav-link">
                <li><a href="./home.html">About</a></li>
                <li><a href="#">Services</a></li>

                <li class="relative group py-2 nav-dropdown">
                    <!-- peer checkbox: tap to open on mobile, hover still works on desktop -->
                    <input type="checkbox" id="portfolio-dropdown-toggle" class="hidden peer">
                    <label for="portfolio-dropdown-toggle"
                        class="cursor-pointer select-none transition-colors duration-200 flex items-center justify-between md:justify-start gap-1 w-full">
                        Portfolio
                        <i
                            class="fa-solid fa-angle-down text-[10px] mt-0.5 transition-transform duration-300 peer-checked:rotate-180 md:group-hover:rotate-180"></i>
                    </label>

                    <ul
                        class="dropdown-menu hidden peer-checked:flex flex-col w-full mt-2 static bg-slate-800/60
                        md:flex md:flex-col md:absolute md:top-full md:left-1/2 md:-translate-x-1/2 md:mt-2 md:w-44 md:bg-slate-800
                        md:opacity-0 md:invisible md:group-hover:opacity-100 md:group-hover:visible md:scale-95 md:group-hover:scale-100
                        text-slate-200 rounded-lg shadow-xl border border-slate-700/50 transition-all duration-300 transform z-50 overflow-hidden">
                        <li>
                            <a href="./projects.html"
                                class="block px-4 py-2.5 hover:bg-slate-700 hover:text-white transition-colors duration-150">Projects</a>
                        </li>
                        <li>
                            <a href="./certificates.html"
                                class="block px-4 py-2.5 hover:bg-slate-700 hover:text-white border-t border-slate-700/30 transition-colors duration-150">Certificates</a>
                        </li>
                        <li>
                            <a href="./tech-stack.html"
                                class="block px-4 py-2.5 hover:bg-slate-700 hover:text-white border-t border-slate-700/30 transition-colors duration-150">Tech
                                Stack</a>
                        </li>
                    </ul>
                </li>

                <!-- for mobile menu  -->
                <li class="mobile-only-actions">
                    <button id="modebtn-mobile" class="modebtn"><i class="fa-solid fa-lightbulb"></i> Mode</button>
                </li>
                <li class="mobile-only-actions">
                    <a href="./contact.html" class="btn-hire">Hire Me</a>
                </li>
            </ul>

            <div class="nav-action">
                <button id="modebtn" class="modebtn"><i class="fa-solid fa-lightbulb"></i></button>
                <a href="./contact.html" class="btn-hire">Hire Me</a>
            </div>
        </nav>
    </header>

    <!-- selector -->
    <div class="selector mx-auto pt-30 pb-12 text-white min-h-96">

        <div class="max-w-5xl mx-auto px-4">
            <div class="text-center pt-25 pb-12 text-white">
                <h2 class="text-3xl md:text-4xl font-bold">Portfolio Showcase</h2>
                <p class="text-slate-300 mt-3">Explore my journey through projects, certificates and technical
                    expertise...
                </p>
            </div>

            <div class="explore-box flex justify-center">
                <ul
                    class="flex gap-4 bg-white/6 backdrop-blur-[12px] p-2 rounded-xl border border-white/10 [box-shadow:inset_1px_1px_4px_rgba(255,255,255,0.2),inset_-1px_-1px_6px_rgba(0,0,0,0.3),0_4px_12px_rgba(0,0,0,0.15)] text-[#e5e5e5]">

                    <li>
                        <a href="./projects.html" class="block">
                            <button
                                class="min-w-[100px] px-6 py-2.5 text-sm font-semibold tracking-[0.3px] rounded-lg bg-slate-700/40 cursor-pointer transition-all duration-1000 ease-in-out hover:text-slate-900 hover:bg-slate-800 ">
                                Projects
                            </button>
                        </a>
                    </li>

                    <li>
                        <a href="./certificates.html" class="block">
                            <button
                                class="min-w-[100px] px-6 py-2.5 text-sm font-semibold tracking-[0.3px] rounded-lg bg-slate-700/40 cursor-pointer transition-all duration-1000 ease-in-out hover:text-slate-900  hover:bg-slate-800">
                                Certificates
                            </button>
                        </a>
                    </li>

                    <li>
                        <a href="./tech-stack.html" class="block">
                            <button
                                class="min-w-[100px] px-6 py-2.5 text-sm font-semibold tracking-[0.3px] rounded-lg bg-slate-700/40 cursor-pointer transition-all duration-1000 ease-in-out hover:text-slate-900  hover:bg-slate-800 ">
                                Skills
                            </button>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <!-- tech-stack -->
    <section class="tech-container m-20">
        <div class="grid grid-cols-[repeat(auto-fill,minmax(120px,1fr))] gap-6">

            <div class="tech-box">
                <i class="fa-brands fa-js" style="color: rgb(255, 212, 59);"></i>
                <p class="text-sm font-medium">JavaScript</p>
            </div>

            <div class="tech-box">
                <i class="fa-brands fa-react" style="color: rgb(116, 192, 252);"></i>
                <p class="text-sm font-medium">React</p>
            </div>

            <div class="tech-box">
                <i class="fa-brands fa-node-js" style="color: rgb(99, 230, 190);"></i>
                <p class="text-sm font-medium">Node.js</p>
            </div>

            <div class="tech-box">
                <i class="fa-brands fa-css3-alt text-5xl" style="color: rgb(56, 189, 248);"></i>
                <p class="text-sm font-medium">Tailwind CSS</p>
            </div>

        </div>
    </section>
</body>
